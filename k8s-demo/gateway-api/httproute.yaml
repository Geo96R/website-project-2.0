apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: website-project-route
  namespace: default
spec:
  hostnames:
  - example.com  # Replace with your domain
  parentRefs:
  - name: contour-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: website-project-service
      port: 80
